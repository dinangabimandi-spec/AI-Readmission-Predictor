<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Suwa Setha AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            padding: 20px;
            background: #1E3A8A;
            overflow: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 50%, #60A5FA 100%);
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: float 8s ease-in-out infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
            animation: float 10s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(5%, 5%) rotate(5deg); }
        }
        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatShape 20s ease-in-out infinite;
        }
        .shape:nth-child(1) { width: 200px; height: 200px; background: #60A5FA; top: 10%; left: 5%; animation-delay: 0s; }
        .shape:nth-child(2) { width: 150px; height: 150px; background: #93C5FD; top: 60%; right: 10%; animation-delay: 5s; }
        .shape:nth-child(3) { width: 100px; height: 100px; background: #DBEAFE; bottom: 10%; left: 20%; animation-delay: 10s; }
        .shape:nth-child(4) { width: 120px; height: 120px; background: #BFDBFE; top: 30%; right: 5%; animation-delay: 15s; }
        .shape:nth-child(5) { width: 80px; height: 80px; background: #EFF6FF; bottom: 30%; right: 25%; animation-delay: 3s; }
        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(10px, -10px) scale(1.05); }
        }

        .login-card { 
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            padding: 40px; 
            max-width: 420px; 
            width: 100%; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            animation: fadeIn 0.6s ease; 
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.2);
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header .logo { font-size: 48px; color: #1E3A8A; }
        .login-header h4 { font-weight: 700; color: #1E3A8A; margin-top: 8px; }
        .login-header p { color: #94A3B8; font-size: 14px; }
        .form-control { 
            border-radius: 10px; 
            padding: 12px 16px; 
            font-size: 14px; 
            border: 2px solid #E2E8F0; 
            transition: all 0.3s; 
        }
        .form-control:focus { 
            border-color: #1E3A8A; 
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); 
        }
        .btn-login { 
            background: #1E3A8A; 
            border: none; 
            border-radius: 10px; 
            padding: 12px; 
            font-weight: 600; 
            font-size: 16px; 
            width: 100%; 
            transition: all 0.3s; 
        }
        .btn-login:hover { 
            background: #2563EB; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(30, 58, 138, 0.3); 
        }
        .login-error {
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 12px;
            border-left: 4px solid #EF4444;
            background: #FEF2F2;
            color: #EF4444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .login-error i { font-size: 18px; }
        .role-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="login-card">
    <div class="login-header">
        <div class="logo"><i class="fas fa-hospital"></i></div>
        <h4>Suwa Setha AI</h4>
        <p>Hospital Readmission Risk Predictor</p>
    </div>

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label fw-500">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" class="form-control" name="username" placeholder="Enter your username" required>
            </div>
        </div>
        
        <div class="mb-2">
            <label class="form-label fw-500">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="login-error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="mb-3 d-flex justify-content-between align-items-center">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember" style="font-size:13px;">Remember me</label>
            </div>
            <a href="#" style="font-size:13px; color:#1E3A8A; text-decoration:none;">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-login text-white">
            <i class="fas fa-sign-in-alt me-2"></i> Login
        </button>
    </form>

    <div class="mt-3 text-center">
        <small class="text-muted">Authorized hospital staff only</small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(function() {
        const alerts = document.querySelectorAll('.login-error');
        alerts.forEach(function(alert) {
            alert.style.transition = 'opacity 0.5s ease';
            alert.style.opacity = '0';
            setTimeout(function() { alert.remove(); }, 500);
        });
    }, 5000);
</script>
</body>
</html>
