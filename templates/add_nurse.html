<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Nurse - Suwa Setha AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #F8FAFC; }
        .navbar-dark { background: #1E3A8A !important; }
        .form-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-primary { background: #1E3A8A; border: none; }
        .btn-primary:hover { background: #2563EB; }
        .form-label { font-weight: 500; font-size: 14px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark navbar-expand-lg px-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🏥 Suwa Setha AI</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><span class="navbar-text text-light me-3"><i class="fas fa-user-shield"></i> {{ user.name }}</span></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container py-4">
    <h2 style="color:#1E3A8A;"><i class="fas fa-user-nurse"></i> Add New Nurse</h2>

    <form method="POST" class="form-card">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" name="name" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Assign to Doctor</label>
                <select class="form-control" name="assigned_doctor">
                    <option value="">Unassigned</option>
                    {% for doc in doctors %}
                    <option value="{{ doc.name }}">{{ doc.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Username *</label>
                <input type="text" class="form-control" name="username" placeholder="e.g., n006" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Password *</label>
                <input type="text" class="form-control" name="password" placeholder="e.g., nurse123" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Add Nurse</button>
    </form>
</div>
</body>
</html>
